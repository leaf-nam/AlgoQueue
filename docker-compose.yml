version: "3.8"

services:
  mysql:
    env_file:
      - .env
    image: mysql:8.4
    container_name: algoqueue-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_SCHEME}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${MYSQL_TIMEZONE}
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=128M
      - --max-connections=30
      - --table-open-cache=200
    mem_limit: 300m

  redis:
    image: redis:7.4-alpine
    container_name: algoqueue-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "no"
      - --maxmemory
      - 64mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data:/data
    mem_limit: 64m

  app:
    image: 1eaf/algoqueue-backend:latest
    env_file:
      - .env
    container_name: algoqueue-backend
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: >
        -Xms128m
        -Xmx256m
        -XX:+UseSerialGC
        -XX:MaxMetaspaceSize=128m
    mem_limit: 384m

  frontend:
    image: 1eaf/algoqueue-frontend:latest
    container_name: algoqueue-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    mem_limit: 64m

volumes:
  mysql_data:
  redis_data:
