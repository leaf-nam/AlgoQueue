version: "3.8"

services:
  mysql:
    env_file:
      - .env
    image: mysql:8.4
    container_name: algoqueue-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_SCHEME}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${MYSQL_TIMEZONE}
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7.4-alpine
    container_name: algoqueue-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  app:
    image: algoqueue-backend:latest
    env_file:
      - .env
    container_name: algoqueue-backend
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: prod

  frontend:
    image: algoqueue-frontend:latest
    container_name: algoqueue-frontend
    restart: unless-stopped
    ports:
      - "80:80"

volumes:
  mysql_data:
  redis_data:
